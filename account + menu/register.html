<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTeM Cafeteria</title>
    <link rel="stylesheet" type="text/css" href="../css/login.css">
</head>
<body>
    
<div class="navbar">

    <div class="logo">
        <h2>UTeM Campus Food Ordering System</h2>
    </div>

</div>

<div class="container">

    <h1>Customer Register</h1>

    <p class="subtitle">Create customer account before ordering</p>

    <form onsubmit="event.preventDefault(); registerCustomer();">

        <div class="form-group">
            <label>Customer Name</label>
            <input type="text" id="customerName" placeholder="Enter customer name" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="customerPhone" placeholder="Enter phone number" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="customerEmail" placeholder="Enter email address" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="customerPassword" placeholder="Create password" required>
        </div>

        <button type="submit">Register</button>

    </form>

    <p class="link-text">Already have an account? <a href="login.html">Login here</a></p>

</div>

<script>

function registerCustomer()
{
    localStorage.setItem(
        "customerName",document.getElementById("customerName").value
    );

    localStorage.setItem(
        "customerPhone",document.getElementById("customerPhone").value
    );

    localStorage.setItem(
        "customerEmail",document.getElementById("customerEmail").value
    );

    localStorage.setItem(
        "customerPassword",document.getElementById("customerPassword").value
    );

    alert("Registration Successful");

    window.location.href = "login.html";
}

</script>

</body>
</html>
