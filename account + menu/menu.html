<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTeM Cafeteria - Menu</title>
    <link rel="stylesheet" type="text/css" href="../css/login.css">
    <style>
        /* ── MENU PAGE EXTRAS ── */

        .menu-wrapper {
            width: 90%;
            max-width: 1000px;
            margin: 50px auto;
        }

        .menu-header {
            background: white;
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
            padding: 30px 35px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .menu-header h1 {
            color: #274472;
            margin: 0;
        }

        /* Search bar */
        .search-bar {
            display: flex;
            gap: 10px;
            flex: 1;
            max-width: 350px;
        }

        .search-bar input {
            flex: 1;
            padding: 11px 15px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 14px;
        }

        .search-bar button {
            width: auto;
            padding: 11px 18px;
            font-size: 14px;
            border-radius: 10px;
            background: #A7C7E7;
            color: #274472;
        }

        /* Category filter tabs */
        .category-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .tab-btn {
            background: white;
            color: #274472;
            border: 2px solid #A7C7E7;
            border-radius: 25px;
            padding: 9px 22px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s;
        }

        .tab-btn:hover,
        .tab-btn.active {
            background: #163B73;
            color: white;
            border-color: #163B73;
        }

        /* Menu grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        /* Individual menu card */
        .menu-card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.10);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 35px rgba(0,0,0,0.15);
        }

        .menu-card-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            background: #EEF1F4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
        }

        .menu-card-body {
            padding: 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .menu-card-category {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #888;
            margin-bottom: 5px;
        }

        .menu-card-name {
            font-size: 16px;
            font-weight: bold;
            color: #274472;
            margin-bottom: 6px;
        }

        .menu-card-price {
            font-size: 18px;
            font-weight: bold;
            color: #163B73;
            margin-bottom: 14px;
        }

        .add-to-cart-btn {
            margin-top: auto;
            background: #A7C7E7;
            color: #274472;
            border: none;
            border-radius: 10px;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.25s;
        }

        .add-to-cart-btn:hover {
            background: #163B73;
            color: white;
        }

        /* Cart badge in navbar */
        .cart-badge-wrap {
            position: relative;
            display: inline-block;
        }

        .cart-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            font-size: 11px;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* No results */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 20px;
            color: #999;
            font-size: 16px;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #163B73;
            color: white;
            padding: 14px 22px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s, transform 0.3s;
            z-index: 999;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .menu-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .search-bar {
                max-width: 100%;
                width: 100%;
            }

            .menu-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
        }
    </style>
</head>

<body onload="checkLogin()">

<!-- NAVIGATION -->
<div class="navbar">
    <div class="logo">
        <h2>UTeM Campus Food Ordering System</h2>
    </div>

    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="profile.html">Profile</a>
        <a href="menu.html">Menu</a>
        <a href="#">Search</a>
        <a href="cart.html">Cart (<span id="cartCount">0</span>)</a>
        <a href="#" onclick="logoutCustomer()">Logout</a>
    </div>
</div>

<!-- MENU CONTENT -->
<div class="menu-wrapper">

    <!-- Header + Search -->
    <div class="menu-header">
        <h1>Our Menu</h1>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search food or drinks..." oninput="filterMenu()">
            <button onclick="filterMenu()">Search</button>
        </div>
    </div>

    <!-- Category Tabs -->
    <div class="category-tabs">
        <button class="tab-btn active" onclick="setCategory('All', this)">All</button>
        <button class="tab-btn" onclick="setCategory('Rice', this)">Rice</button>
        <button class="tab-btn" onclick="setCategory('Noodles', this)">Noodles</button>
        <button class="tab-btn" onclick="setCategory('Snacks', this)">Snacks</button>
        <button class="tab-btn" onclick="setCategory('Drinks', this)">Drinks</button>
        <button class="tab-btn" onclick="setCategory('Desserts', this)">Desserts</button>
    </div>

    <!-- Menu Grid -->
    <div class="menu-grid" id="menuGrid">
        <!-- Cards injected by JS -->
    </div>

</div>

<!-- Toast Notification -->
<div class="toast" id="toast">✓ Item added to cart!</div>

<script>

/* ── MENU DATA ──
   In a real PHP project, this data would come from the database via AJAX/PHP.
   For now we use a static array matching your menu table structure.
*/
const menuItems = [
    { menu_id: 1, name: "Nasi Lemak",       price: 4.50, category: "Rice",     emoji: "🍛" },
    { menu_id: 2, name: "Nasi Goreng",       price: 5.00, category: "Rice",     emoji: "🍳" },
    { menu_id: 3, name: "Nasi Ayam",         price: 5.50, category: "Rice",     emoji: "🍗" },
    { menu_id: 4, name: "Mee Goreng",        price: 4.50, category: "Noodles",  emoji: "🍜" },
    { menu_id: 5, name: "Mee Rebus",         price: 4.50, category: "Noodles",  emoji: "🍲" },
    { menu_id: 6, name: "Laksa",             price: 5.50, category: "Noodles",  emoji: "🥣" },
    { menu_id: 7, name: "Roti Canai",        price: 2.00, category: "Snacks",   emoji: "🫓" },
    { menu_id: 8, name: "Karipap",           price: 1.50, category: "Snacks",   emoji: "🥟" },
    { menu_id: 9, name: "Teh Tarik",         price: 2.50, category: "Drinks",   emoji: "🧋" },
    { menu_id: 10, name: "Milo Ais",         price: 2.50, category: "Drinks",   emoji: "🥤" },
    { menu_id: 11, name: "Air Mineral",      price: 1.50, category: "Drinks",   emoji: "💧" },
    { menu_id: 12, name: "Cendol",           price: 3.00, category: "Desserts", emoji: "🍧" },
    { menu_id: 13, name: "Ais Kacang",       price: 3.50, category: "Desserts", emoji: "🍨" },
    { menu_id: 14, name: "Puding Roti",      price: 2.50, category: "Desserts", emoji: "🍮" },
];

let activeCategory = "All";
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ── RENDER ── */
function renderMenu()
{
    const search = document.getElementById("searchInput").value.toLowerCase();
    const grid   = document.getElementById("menuGrid");

    const filtered = menuItems.filter(item => {
        const matchCategory = (activeCategory === "All") || (item.category === activeCategory);
        const matchSearch   = item.name.toLowerCase().includes(search);
        return matchCategory && matchSearch;
    });

    if (filtered.length === 0)
    {
        grid.innerHTML = `<div class="no-results">No items found. Try a different search or category.</div>`;
        return;
    }

    grid.innerHTML = filtered.map(item => `
        <div class="menu-card">
            <div class="menu-card-img">${item.emoji}</div>
            <div class="menu-card-body">
                <div class="menu-card-category">${item.category}</div>
                <div class="menu-card-name">${item.name}</div>
                <div class="menu-card-price">RM ${item.price.toFixed(2)}</div>
                <button class="add-to-cart-btn" onclick="addToCart(${item.menu_id})">
                    + Add to Cart
                </button>
            </div>
        </div>
    `).join("");
}

/* ── CATEGORY FILTER ── */
function setCategory(category, btn)
{
    activeCategory = category;

    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    renderMenu();
}

/* ── SEARCH FILTER ── */
function filterMenu()
{
    renderMenu();
}

/* ── ADD TO CART ── */
function addToCart(menuId)
{
    const item = menuItems.find(i => i.menu_id === menuId);
    if (!item) return;

    const existing = cart.find(c => c.menu_id === menuId);

    if (existing)
    {
        existing.quantity += 1;
        existing.subtotal  = +(existing.quantity * item.price).toFixed(2);
    }
    else
    {
        cart.push({
            menu_id:  item.menu_id,
            name:     item.name,
            price:    item.price,
            quantity: 1,
            subtotal: item.price
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartCount();
    showToast(`${item.name} added to cart!`);
}

/* ── CART COUNT BADGE ── */
function updateCartCount()
{
    const total = cart.reduce((sum, c) => sum + c.quantity, 0);
    document.getElementById("cartCount").textContent = total;
}

/* ── TOAST ── */
function showToast(message)
{
    const toast = document.getElementById("toast");
    toast.textContent = "✓ " + message;
    toast.classList.add("show");

    setTimeout(() => toast.classList.remove("show"), 2500);
}

/* ── AUTH CHECK ── */
function checkLogin()
{
    if (localStorage.getItem("loginStatus") !== "true")
    {
        alert("Please Login First");
        window.location.href = "login.html";
    }

    updateCartCount();
    renderMenu();
}

/* ── LOGOUT ── */
function logoutCustomer()
{
    localStorage.setItem("loginStatus", "false");
    alert("Logout Successful");
    window.location.href = "login.html";
}

</script>

</body>
</html>
