<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Checkout</title>

    <link rel="stylesheet" type="text/css" href="../css/cart.css">
    
    <style>
        
        .summary-box {
            border: 1px solid #E3E7EB;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            background: #FAFBFC;
        }

        .summary-box h3 {
            color: #274472;
            margin-bottom: 12px;
            font-size: 18px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .item-main {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            color: #333;
        }

        
        .item-customization {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
            padding-left: 5px;
            line-height: 1.5;
        }

        .item-note {
            font-style: italic;
            color: #C0392B;
            font-weight: 500;
        }

        .item-qty {
            width: 50px;
            text-align: center;
            color: #555;
        }

        .item-subtotal {
            width: 80px;
            text-align: right;
            font-weight: bold;
            color: #274472;
        }

        .divider {
            border-top: 1px solid #E3E7EB;
            margin: 15px 0;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            color: #163B73;
            margin-top: 10px;
        }

        
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #F4F6F8;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: normal;
            border: 1px solid #E3E7EB;
            transition: 0.2s;
        }

        .radio-label:hover {
            background: #EAEFF5;
        }

        .radio-label input {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        
        .btn-pay {
            background: #A7C7E7;
            color: #274472;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 4px 10px rgba(167, 199, 231, 0.3);
            transition: all 0.3s ease;
        }

        .btn-pay:hover {
            background: #92B8DD;
            box-shadow: 0 6px 15px rgba(146, 184, 221, 0.4);
            transform: translateY(-1px);
        }

        .btn-pay:active {
            transform: translateY(1px);
        }

        .link-area {
            margin-top: 20px;
            text-align: center;
        }

        .back-link {
            color: #274472;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
            display: inline-block;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            color: #163B73;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Checkout</h1>
        <p class="subtitle">Review your order details and complete your secure payment.</p>

        
        <div class="summary-box">
            <h3>Order Summary</h3>
            <div class="divider"></div>
            
            
            <div id="checkoutItemsContainer"></div>
            
            <div class="divider"></div>
            
            <div class="total-row">
                <span>Grand Total</span>
                <span id="grandTotalPrice">RM 0.00</span>
            </div>
        </div>

   
        <div class="form-group">
            <label>Choose Payment Method</label>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="paymentMethod" value="fpx" checked>
                    <strong>FPX Online Banking</strong>
                </label>
                <label class="radio-label">
                    <input type="radio" name="paymentMethod" value="ewallet">
                    <strong>E-Wallet (Touch 'n Go / GrabPay)</strong>
                </label>
            </div>
        </div>

        
        <button class="btn-pay" onclick="processPayment()">Confirm & Pay Now</button>
        
       
        <div class="link-area">
            <a href="cart.html" class="back-link">← Back to Shopping Cart</a>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

    
        if (cart.length === 0) {
            cart = [
                { 
                    name: "Kampung Fried Rice", 
                    price: 7.00, 
                    quantity: 2, 
                    spicy: "Medium", 
                    drink: "", 
                    addons: ["Extra Egg (+RM2)"], 
                    note: "No onions please",
                    subtotal: 18.00 
                },
                { 
                    name: "Fresh Lemonade", 
                    price: 2.00, 
                    quantity: 1, 
                    spicy: "", 
                    drink: "Cold (+RM0.50)", 
                    addons: [], 
                    note: "",
                    subtotal: 2.50 
                }
            ];
        }

        function loadCheckoutSummary() {
            const container = document.getElementById("checkoutItemsContainer");
            let html = "";
            let total = 0;

            cart.forEach(item => {
                let itemSubtotal = item.subtotal || (item.price * item.quantity);
                total += itemSubtotal;

                let customizationHtml = "";
                if (item.spicy) customizationHtml += `<div>• Spicy: ${item.spicy}</div>`;
                if (item.drink) customizationHtml += `<div>• Beverage: ${item.drink}</div>`;
                if (item.addons && item.addons.length > 0) {
                    customizationHtml += `<div>• Add-ons: ${item.addons.join(", ")}</div>`;
                }
                if (item.note) customizationHtml += `<div class="item-note">• Note: "${item.note}"</div>`;

                html += `
                    <div class="item-row">
                        <div class="item-main">
                            <div class="item-name">${item.name}</div>
                            ${customizationHtml ? `<div class="item-customization">${customizationHtml}</div>` : ''}
                        </div>
                        <div class="item-qty">x${item.quantity}</div>
                        <div class="item-subtotal">RM ${itemSubtotal.toFixed(2)}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
            document.getElementById("grandTotalPrice").innerText = `RM ${total.toFixed(2)}`;
        }

        function processPayment() {
            const selectedMethod = document.querySelector('input[name="paymentMethod"]:checked').value;
            
            localStorage.setItem("lastOrder", JSON.stringify(cart));
            localStorage.setItem("paymentMethodUsed", selectedMethod === "fpx" ? "FPX Online Banking" : "E-Wallet");
            localStorage.setItem("receiptId", "TXN-" + Math.floor(Math.random() * 900000 + 100000));
            localStorage.setItem("receiptDate", new Date().toLocaleString('en-US', { hour12: true }));

            alert(`Payment authorized successfully via ${selectedMethod.toUpperCase()}!`);
            localStorage.removeItem("cart");
            window.location.href = "receipt.html"; 
        }

        window.onload = loadCheckoutSummary;
    </script>
</body>
</html>
