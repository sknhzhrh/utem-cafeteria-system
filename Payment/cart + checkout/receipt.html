<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Receipt</title>
    <link rel="stylesheet" type="text/css" href="../css/cart.css">
    
    <style>
       
        .status-badge {
            background: #D4EDDA;
            color: #155724;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
            display: inline-block;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meta-box {
            background: #F8F9FA;
            padding: 15px;
            border-radius: 12px;
            font-size: 13.5px;
            color: #555;
            margin-bottom: 25px;
            border-left: 5px solid #163B73;
            text-align: left;
        }

        .meta-box div {
            margin-bottom: 6px;
        }

        .meta-box div:last-child {
            margin-bottom: 0;
        }

        .receipt-bill {
            border: 1px dashed #B8C4D1;
            background: #FFF;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            font-size: 14.5px;
        }

        .item-name {
            font-weight: 600;
            color: #333;
        }

        .item-customization {
            font-size: 12px;
            color: #777;
            margin-top: 3px;
            padding-left: 5px;
            line-height: 1.4;
        }

        .item-note {
            font-style: italic;
            color: #C0392B;
        }

        .divider {
            border-top: 1px dashed #B8C4D1;
            margin: 15px 0;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 18px;
            color: #163B73;
        }

      
        .btn-store {
            display: block;
            background: #A7C7E7;
            color: #274472;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            text-decoration: none;
            font-size: 16px;
            text-align: center;
            margin-top: 30px;
            box-shadow: 0 4px 10px rgba(167, 199, 231, 0.3);
            transition: all 0.3s ease;
        }

        .btn-store:hover {
            background: #92B8DD;
            box-shadow: 0 6px 15px rgba(146, 184, 221, 0.4);
            transform: translateY(-1px);
        }

        .btn-store:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="container" style="text-align: center;">
        <h1>Transaction Receipt</h1>
        <div class="status-badge">✔ Payment Successful</div>

      
        <div class="meta-box">
            <div><strong>Transaction ID:</strong> <span id="recId">Loading...</span></div>
            <div><strong>Date & Time:</strong> <span id="recDate">Loading...</span></div>
            <div><strong>Payment Via:</strong> <span id="recMethod">Loading...</span></div>
        </div>

      
        <div class="receipt-bill">
            <div id="receiptItemsContainer"></div>
            
            <div class="divider"></div>
            
            <div class="total-row">
                <span>Amount Paid</span>
                <span id="recTotal">RM 0.00</span>
            </div>
        </div>

        <p class="subtitle" style="font-style: italic; font-size: 14px;">
            Thank you for your business! Your order has been securely submitted to the kitchen.
        </p>

      
        <a href="cart.html" class="btn-store">
            Return to Main Store
        </a>
    </div>

    <script>
        function loadReceiptInfo() {
            const lastOrder = JSON.parse(localStorage.getItem("lastOrder"));
            const receiptId = localStorage.getItem("receiptId");
            const receiptDate = localStorage.getItem("receiptDate");
            const paymentMethod = localStorage.getItem("paymentMethodUsed");

            if (!lastOrder) {
                document.getElementById("recId").innerText = "TXN-764912";
                document.getElementById("recDate").innerText = "06/05/2026, 10:19 PM";
                document.getElementById("recMethod").innerText = "FPX Online Banking";
                
                const mockReceiptItems = [
                    { 
                        name: "Kampung Fried Rice", 
                        price: 7.00, 
                        quantity: 2, 
                        spicy: "Medium", 
                        drink: "", 
                        addons: ["Extra Egg (+RM2)"], 
                        note: "No onions please",
                        subtotal: 18.00 
                    },
                    { 
                        name: "Fresh Lemonade", 
                        price: 2.00, 
                        quantity: 1, 
                        spicy: "", 
                        drink: "Cold (+RM0.50)", 
                        addons: [], 
                        note: "",
                        subtotal: 2.50 
                    }
                ];
                renderReceiptList(mockReceiptItems, 20.50);
                return;
            }

            document.getElementById("recId").innerText = receiptId;
            document.getElementById("recDate").innerText = receiptDate;
            document.getElementById("recMethod").innerText = paymentMethod;

            let grandTotal = 0;
            lastOrder.forEach(item => {
                grandTotal += item.subtotal || (item.price * item.quantity);
            });

            renderReceiptList(lastOrder, grandTotal);
        }

        function renderReceiptList(items, totalAmount) {
            const container = document.getElementById("receiptItemsContainer");
            let html = "";

            items.forEach(item => {
                let itemSubtotal = item.subtotal || (item.price * item.quantity);

                let customizationHtml = "";
                if (item.spicy) customizationHtml += `<div>• Spicy: ${item.spicy}</div>`;
                if (item.drink) customizationHtml += `<div>• Beverage: ${item.drink}</div>`;
                if (item.addons && item.addons.length > 0) {
                    customizationHtml += `<div>• Add-ons: ${item.addons.join(", ")}</div>`;
                }
                if (item.note) customizationHtml += `<div class="item-note">• Note: "${item.note}"</div>`;

                html += `
                    <div class="item-row">
                        <div style="text-align: left; flex: 1;">
                            <div class="item-name">${item.name}</div>
                            ${customizationHtml ? `<div class="item-customization">${customizationHtml}</div>` : ''}
                        </div>
                        <div style="width: 50px; text-align: center; color: #555;">x${item.quantity}</div>
                        <div style="width: 80px; text-align: right; font-weight: 500;">RM ${itemSubtotal.toFixed(2)}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
            document.getElementById("recTotal").innerText = `RM ${totalAmount.toFixed(2)}`;
        }

        window.onload = loadReceiptInfo;
    </script>
</body>
</html>
