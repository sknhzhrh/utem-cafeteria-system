<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart</title>
<link rel="stylesheet" type="text/css" href="../css/cart.css">
</head>
<body onload="loadCart()">

<h1>Your Cart 🛒</h1>

<div class="cart-box" id="cartBox"></div>

<script>

// Load cart from localStorage
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadCart() {
    renderCart();
}

// Render cart items
function renderCart() {
    const box = document.getElementById("cartBox");
    if (cart.length === 0) {
        box.innerHTML = "<p>Your cart is empty.</p>";
        return;
    }

    let html = "";
    let total = 0;

    cart.forEach((item, index) => {
        total += item.subtotal || (item.price * item.quantity);

        html += `
        <div class="item">
            <div>
                <div class="name">${item.name}</div>
                <div>RM ${(item.price).toFixed(2)}</div>
                <div>Subtotal: RM ${(item.subtotal || (item.price * item.quantity)).toFixed(2)}</div>
            </div>

            <div class="controls">
                <button onclick="decrease(${index})">-</button>
                <span>${item.quantity}</span>
                <button onclick="increase(${index})">+</button>
                <button onclick="removeItem(${index})">x</button>
                <button onclick="openCustomize(${index})">Custom</button>
            </div>
        </div>
        `;
    });

    html += `
        <div class="total">Total: RM ${total.toFixed(2)}</div>
        <button class="checkout" onclick="checkout()">Checkout</button>
    `;

    box.innerHTML = html;
    localStorage.setItem("cart", JSON.stringify(cart));
}

// Quantity controls
function increase(i) {
    cart[i].quantity++;
    cart[i].subtotal = calculateItemSubtotal(cart[i]);
    renderCart();
}

function decrease(i) {
    cart[i].quantity--;
    if (cart[i].quantity <= 0) cart.splice(i, 1);
    else cart[i].subtotal = calculateItemSubtotal(cart[i]);
    renderCart();
}

function removeItem(i) {
    cart.splice(i, 1);
    renderCart();
}

// Calculate subtotal for one item
function calculateItemSubtotal(item) {
    let subtotal = item.price * item.quantity;

    if(item.addons) {
        item.addons.forEach(a => {
            // remove RM value from addon label if exists
            let match = a.match(/\+\RM(\d+(\.\d+)?)/);
            if(match) subtotal += parseFloat(match[1]);
            else subtotal += 0;
        });
    }

    if(item.drink && item.drink.includes("Cold")) subtotal += 0.5 * item.quantity;

    return subtotal;
}

// Checkout
function checkout() {
    window.location.href = "payment.html"; 
}

// Open customize page
function openCustomize(index) {
    localStorage.setItem("editIndex", index);
    localStorage.setItem("editItem", JSON.stringify(cart[index]));
    window.location.href = "customization.html";
}

</script>
</body>
</html>
