<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTeM Cafeteria</title>
    <link rel="stylesheet" type="text/css" href="../css/login.css">
</head>

<body onload="displayProfile()">

<div class="navbar">
    <div class="logo">
        <h2>UTeM Campus Food Ordering System</h2>
    </div>

    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="profile.html">Profile</a>
        <a href="menu.html">Menu</a>
        <a href="#">Search</a>
        <a href="cart.html">Cart</a>
        <a href="#" onclick="logoutCustomer()">Logout</a>
    </div>
</div>


<div class="profile-box">

    <div class="profile-icon">
        C
    </div>

    <h1>Customer Profile</h1>

    <div class="profile-info">
        <strong>Name:</strong>
        <p id="profileName"></p>
    </div>

    <div class="profile-info">
        <strong>Phone:</strong>
        <p id="profilePhone"></p>
    </div>

    <div class="profile-info">
        <strong>Email:</strong>
        <p id="profileEmail"></p>
    </div>

    <a href="dashboard.html" class="btn">Back to Home</a>

</div>

<script>

function displayProfile()
{
    document.getElementById("profileName").innerHTML =
    localStorage.getItem("customerName");

    document.getElementById("profilePhone").innerHTML =
    localStorage.getItem("customerPhone");

    document.getElementById("profileEmail").innerHTML =
    localStorage.getItem("customerEmail");
}

function logoutCustomer()
{
    localStorage.setItem("loginStatus", "false");

    alert("Logout Successful");

    window.location.href = "login.html";
}

</script>

</body>
</html>
